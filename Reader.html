<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Reader</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora&family=Caveat:wght@500&family=Special+Elite&display=swap');

body{
margin:0;
font-family:Lora,serif;
background:#fffdf0;
color:#3a2f1f;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.screen{
width:100%;
max-width:600px;
padding:30px;
text-align:center;
display:none;
}

.active{display:block;}

h1{
font-family:"Playfair Display",serif;
font-size:40px;
margin-bottom:10px;
}

.tagline{
font-style:italic;
color:#6f5e48;
margin-bottom:30px;
}

input{
padding:12px;
font-size:16px;
width:80%;
border:1px solid #c9b79c;
border-radius:6px;
margin-bottom:20px;
}

button{
padding:12px 20px;
font-size:15px;
border:none;
background:#3f2d1b;
color:white;
border-radius:6px;
cursor:pointer;
}

.mood-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.mood-chip{
padding:10px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.page-wrapper{
display:flex;
justify-content:center;
}

.page{
background:#fdf8f0;
border:1px solid #e0d0b0;
border-radius:4px;
padding:2.5rem;
line-height:1.9;
max-width:420px;
text-align:left;
position:relative;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.stamp{
font-family:"Special Elite";
color:#a13a2c;
opacity:0.6;
font-size:14px;
transform:rotate(-3deg);
margin-bottom:10px;
}

.chapter{
font-family:"Playfair Display";
font-size:18px;
margin-bottom:15px;
}

.highlight{
padding:2px 4px;
border-radius:2px;
}

.margin-note{
font-family:Caveat;
font-size:14px;
position:absolute;
max-width:120px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#7c6c57;
}

.action-buttons{
margin-top:20px;
}

</style>
</head>

<body>

<div id="screen1" class="screen active">
<h1>Dear Reader</h1>
<div class="tagline">what the margins say about you today</div>
<input id="username" placeholder="your name or reader alias">
<br>
<button onclick="goMood()">Open my page →</button>
</div>

<div id="screen2" class="screen">
<h2>How are you feeling right now?</h2>
<div id="moods" class="mood-grid"></div>
</div>

<div id="screen3" class="screen">
<div class="page-wrapper">
<div id="page" class="page"></div>
</div>

<div class="action-buttons">
<button onclick="savePage()">Save my page 📸</button>
<button onclick="backMood()">Try another mood ↩</button>
</div>

<div class="footer">
Made with ✦ for readers everywhere · #DearReader #Bookstagram #BookTok
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

const prose={
warm:`The morning felt lighter than expected, as if the world had quietly decided to forgive yesterday. 
Somewhere in the distance someone was laughing, and it reminded her that joy rarely arrives loudly. 
It simply appears beside you and waits to be noticed.

There are days when the ordinary becomes luminous — when a cup of tea, a page of a novel, and the sun through a window feel like small miracles.

She wondered if happiness was not something to chase, but something that had been waiting patiently all along.`,

calm:`The afternoon unfolded slowly, like a well-loved chapter you return to again and again. 
Outside the window the trees moved with a gentle certainty, as though they had never once doubted the rhythm of the seasons.

Reading had always felt like borrowing another mind's quiet wisdom.

And somewhere between the lines, she found a strange and comforting realization — that the world did not need to be solved all at once.`,

heavy:`Evening arrived with a softness that almost felt like mercy. 
The sky dimmed slowly, as though it understood that some days end more delicately than others.

There are moments when the heart carries more than it knows how to say.

But in the quiet between paragraphs, she felt something loosen — the fragile hope that even the heaviest feelings eventually become stories we survive.`};

const moodsDiv=document.getElementById("moods");

Object.keys(moods).forEach(name=>{
let m=moods[name];
let chip=document.createElement("div");
chip.className="mood-chip";
chip.style.background=m.highlight;
chip.innerText=`${m.emoji} ${name}`;
chip.onclick=()=>generate(name);
moodsDiv.appendChild(chip);
});

function goMood(){
if(!username.value)return;
show("screen2");
}

function backMood(){show("screen2");}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

function generate(moodName){

let m=moods[moodName];
document.body.style.background=m.bg;

let proseText=prose[m.cat];

let quote=rand(m.quotes);
let note1=rand(m.notes);
let note2=rand(m.notes);
let note3=rand(m.notes);
let note4=rand(m.notes);

let page=document.getElementById("page");

page.style.borderLeft=`4px solid ${m.edge}`;

page.innerHTML=`
<div class="stamp">From the collection of ${username.value}</div>
<div class="chapter">Chapter XII — What Remains · p.247</div>

<p>${proseText}</p>

<p><span class="highlight" style="background:${m.highlight}">${quote}</span></p>

<p>Sometimes the smallest sentence in a book becomes the one you carry with you for years.</p>

<p><span style="text-decoration:underline">There is always another page.</span></p>

<div class="margin-note" style="top:120px;right:-110px;transform:rotate(-3deg);color:${m.ink}">${note1}</div>
<div class="margin-note" style="top:220px;right:-120px;transform:rotate(2deg);color:${m.ink}">${note2}</div>
<div class="margin-note" style="top:160px;left:-110px;transform:rotate(-2deg);color:${m.ink}">${note3}</div>
<div class="margin-note" style="top:320px;left:-100px;transform:rotate(3deg);color:${m.ink}">${note4}</div>

`;

currentMood=moodName;

show("screen3");
}

let currentMood="";

function savePage(){
html2canvas(document.getElementById("page")).then(canvas=>{
let link=document.createElement("a");
link.download=`dear-reader-${currentMood}.png`;
link.href=canvas.toDataURL();
link.click();
});
}

</script>
</body>
</html>
